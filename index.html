<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckEdit - AI 簡報轉化工具</title>
    <!-- 核心庫導入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PDF 處理 & OCR 模型 & PPT 生成庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s ease; }
        .drop-zone.active { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 初始化 PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [status, setStatus] = useState('idle'); // idle, processing, completed, error
            const [progress, setProgress] = useState(0);
            const [log, setLog] = useState('');
            const [slidesData, setSlidesData] = useState([]);
            const fileInputRef = useRef(null);

            const addLog = (msg) => setLog(prev => `${msg}\n${prev}`);

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.type === 'application/pdf' || file.type.startsWith('image/')) {
                    processFile(file);
                } else {
                    alert('請上傳 PDF 檔案或圖片 (PNG/JPG)');
                }
            };

            const processFile = async (file) => {
                try {
                    setStatus('processing');
                    setProgress(5);
                    const processedSlides = [];

                    if (file.type === 'application/pdf') {
                        addLog('🚀 開始解析 PDF...');
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        const totalPages = pdf.numPages;
                        addLog(`📄 偵測到 ${totalPages} 頁簡報`);

                        for (let i = 1; i <= totalPages; i++) {
                            setProgress(Math.round((i / totalPages) * 100));
                            addLog(`⚙️ 正在處理第 ${i} 頁...`);

                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;

                            await page.render({ canvasContext: context, viewport }).promise;
                            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            
                            const elements = await runOCR(imageDataUrl, canvas.width, canvas.height);
                            processedSlides.push({
                                backgroundImage: imageDataUrl,
                                elements: elements,
                                width: canvas.width,
                                height: canvas.height
                            });
                        }
                    } else {
                        // 處理圖片檔案
                        addLog('🖼️ 開始解析圖片檔案...');
                        setProgress(30);
                        const imageDataUrl = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve(e.target.result);
                            reader.readAsDataURL(file);
                        });

                        const img = new Image();
                        await new Promise((resolve) => {
                            img.onload = resolve;
                            img.src = imageDataUrl;
                        });

                        const elements = await runOCR(imageDataUrl, img.width, img.height);
                        processedSlides.push({
                            backgroundImage: imageDataUrl,
                            elements: elements,
                            width: img.width,
                            height: img.height
                        });
                        setProgress(100);
                    }

                    setSlidesData(processedSlides);
                    setStatus('completed');
                    addLog('✅ 解析完成！點擊下方按鈕導出 PPTX');
                } catch (err) {
                    console.error(err);
                    setStatus('error');
                    addLog('❌ 處理失敗: ' + err.message);
                }
            };

            const runOCR = async (imageDataUrl, width, height) => {
                addLog(`   🔍 AI 執行 OCR 偵測中...`);
                const { data } = await Tesseract.recognize(imageDataUrl, 'chi_tra+eng');

                return data.blocks.map(block => ({
                    text: block.text.trim(),
                    x: (block.bbox.x0 / width) * 100,
                    y: (block.bbox.y0 / height) * 100,
                    w: ((block.bbox.x1 - block.bbox.x0) / width) * 100,
                    h: ((block.bbox.y1 - block.bbox.y0) / height) * 100,
                    fontSize: block.paragraphs[0]?.lines[0]?.words[0]?.font_size || 12
                })).filter(el => el.text.length > 1);
            };

            const exportToPptx = () => {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';

                slidesData.forEach((slide) => {
                    const pptSlide = pptx.addSlide();
                    
                    pptSlide.addImage({ 
                        data: slide.backgroundImage, 
                        x: 0, y: 0, w: '100%', h: '100%' 
                    });

                    slide.elements.forEach(el => {
                        pptSlide.addText(el.text, {
                            x: `${el.x}%`,
                            y: `${el.y}%`,
                            w: `${el.w}%`,
                            h: `${el.h}%`,
                            fontSize: el.fontSize / 2.5,
                            color: '333333',
                            valign: 'top'
                        });
                    });
                });

                pptx.writeFile({ fileName: `DeckEdit_Export_${Date.now()}.pptx` });
                addLog('🎉 PPTX 檔案已成功導出！');
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {/* Header */}
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center space-x-2">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                <Icon name="layers" className="text-white w-6 h-6" />
                            </div>
                            <span className="text-xl font-black tracking-tighter">DECKEDIT <span className="text-blue-600">PRO</span></span>
                        </div>
                        <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                            本地 AI 引擎模式
                        </div>
                    </nav>

                    <main className="flex-1 max-w-4xl mx-auto w-full p-6 md:p-12">
                        {/* Upload Area */}
                        {status === 'idle' && (
                            <div 
                                onClick={() => fileInputRef.current.click()}
                                className="drop-zone group cursor-pointer bg-white rounded-[2rem] p-16 text-center shadow-xl shadow-blue-500/5 hover:shadow-2xl hover:border-blue-400 transition-all"
                            >
                                <input 
                                    type="file" 
                                    ref={fileInputRef} 
                                    className="hidden" 
                                    accept="application/pdf,image/*"
                                    onChange={handleFile}
                                />
                                <div className="bg-blue-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                    <Icon name="upload-cloud" className="text-blue-600 w-10 h-10" />
                                </div>
                                <h2 className="text-3xl font-bold mb-4">開始轉化簡報</h2>
                                <p className="text-slate-500 text-lg">拖放或點擊上傳 PDF 檔案或簡報截圖</p>
                                <div className="mt-8 flex justify-center space-x-4 text-sm font-medium text-slate-400">
                                    <span className="flex items-center"><Icon name="shield" className="w-4 h-4 mr-1"/> 隱私安全</span>
                                    <span className="flex items-center"><Icon name="cpu" className="w-4 h-4 mr-1"/> 本地辨識</span>
                                    <span className="flex items-center"><Icon name="file-type" className="w-4 h-4 mr-1"/> 支援 PDF/圖片</span>
                                </div>
                            </div>
                        )}

                        {/* Processing UI */}
                        {status === 'processing' && (
                            <div className="bg-white rounded-[2rem] p-10 shadow-xl border border-slate-100">
                                <h3 className="text-2xl font-bold mb-6 flex items-center">
                                    <Icon name="loader" className="w-6 h-6 mr-3 text-blue-600 animate-spin" />
                                    AI 正在解析您的內容...
                                </h3>
                                <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden mb-6">
                                    <div 
                                        className="bg-blue-600 h-full transition-all duration-500 ease-out"
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                                <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs text-green-400 h-48 overflow-y-auto whitespace-pre-line leading-relaxed">
                                    {log}
                                </div>
                            </div>
                        )}

                        {/* Completed UI */}
                        {status === 'completed' && (
                            <div className="text-center animate-in fade-in zoom-in duration-500">
                                <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8">
                                    <Icon name="check-circle" className="text-green-600 w-12 h-12" />
                                </div>
                                <h2 className="text-4xl font-bold mb-4">重構完成！</h2>
                                <p className="text-slate-500 text-lg mb-10">
                                    我們已成功分離出可編輯的文字層。
                                </p>
                                <div className="flex flex-col sm:flex-row justify-center gap-4">
                                    <button 
                                        onClick={exportToPptx}
                                        className="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-500/30 flex items-center justify-center transition-all hover:-translate-y-1"
                                    >
                                        <Icon name="file-text" className="mr-2 w-6 h-6" />
                                        導出可編輯 PPTX
                                    </button>
                                    <button 
                                        onClick={() => setStatus('idle')}
                                        className="bg-white text-slate-700 border border-slate-200 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-slate-50 transition-all"
                                    >
                                        重新上傳
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Error UI */}
                        {status === 'error' && (
                            <div className="bg-red-50 border border-red-100 p-8 rounded-[2rem] text-center">
                                <Icon name="alert-circle" className="text-red-500 w-12 h-12 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-red-900 mb-2">發生錯誤</h3>
                                <p className="text-red-700 mb-6">{log.split('\n')[0]}</p>
                                <button onClick={() => setStatus('idle')} className="bg-red-600 text-white px-6 py-2 rounded-xl font-bold">重試</button>
                            </div>
                        )}
                    </main>

                    {/* Features Grid */}
                    {status === 'idle' && (
                        <div className="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-8 border-t border-slate-200 mt-auto">
                            <div className="flex space-x-4">
                                <div className="bg-white shadow-sm border border-slate-100 p-3 rounded-xl h-fit">
                                    <Icon name="mouse-pointer" className="text-blue-500 w-5 h-5" />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-900">座標精準映射</h4>
                                    <p className="text-sm text-slate-500">自動偵測文字在頁面中的百分比座標，完美還原版面。</p>
                                </div>
                            </div>
                            <div className="flex space-x-4">
                                <div className="bg-white shadow-sm border border-slate-100 p-3 rounded-xl h-fit">
                                    <Icon name="image" className="text-purple-500 w-5 h-5" />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-900">多格式支援</h4>
                                    <p className="text-sm text-slate-500">支援 PDF 簡報與單張圖片截圖辨識。</p>
                                </div>
                            </div>
                            <div className="flex space-x-4">
                                <div className="bg-white shadow-sm border border-slate-100 p-3 rounded-xl h-fit">
                                    <Icon name="cpu" className="text-green-500 w-5 h-5" />
                                </div>
                                <div>
                                    <h4 className="font-bold text-slate-900">瀏覽器端 Tesseract AI</h4>
                                    <p className="text-sm text-slate-500">辨識過程均在您的電腦執行，絕不上傳個人資料。</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
