<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Deck Architect - 瀏覽器本地 AI 轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- Transformers.js v3 (Support WebGPU) -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        window.transformers = { pipeline, env };
    </script>
    <style>
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drop-zone:hover {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Local AI Deck Architect</h1>
            <p class="text-slate-600">100% 本地處理 • Donut 模型驅動 • WebGPU 加速</p>
            <div id="gpu-status" class="mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-700">
                正在檢測 WebGPU 支援...
            </div>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
            
            <!-- Step 1: Model Loading -->
            <div id="model-status" class="mb-8 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex flex-col">
                        <span class="text-sm font-semibold text-blue-800">AI 模型狀態: Donut (OCR)</span>
                        <span id="model-file-info" class="text-[10px] text-blue-500">準備中...</span>
                    </div>
                    <span id="model-percent" class="text-xs text-blue-600">等待初始化...</span>
                </div>
                <div class="w-full bg-blue-200 rounded-full h-2">
                    <div id="model-progress" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="model-info" class="text-xs text-blue-500 mt-2 italic">Donut 模型約 200MB，下載後將緩存於瀏覽器。</p>
            </div>

            <!-- Step 2: Drop Zone -->
            <div id="drop-zone" class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-6">
                <input type="file" id="file-input" class="hidden" accept="image/*,application/pdf">
                <div class="flex flex-col items-center">
                    <svg class="w-12 h-12 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-lg font-medium text-slate-700">拖放 PDF 或簡報截圖至此</p>
                    <p class="text-sm text-slate-500 mt-1">支援 PDF, PNG, JPG (最大 20MB)</p>
                </div>
            </div>

            <!-- Step 3: Action & Preview -->
            <div id="processing-view" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-slate-800">處理進度</h3>
                    <button id="convert-btn" disabled class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition disabled:bg-slate-300 disabled:cursor-not-allowed">
                        轉換為 PPTX
                    </button>
                </div>
                <div id="preview-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 border-t pt-4">
                    <!-- 預覽縮圖將插入此處 -->
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-slate-400 text-sm">
            <p>© 2024 AI Deck Studio • Powered by Transformers.js & Donut</p>
        </div>
    </div>

    <script type="module">
        // 初始化 PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let ocrPipeline = null;
        let processedPages = [];

        // 檢查 WebGPU 支援
        async function checkWebGPU() {
            const statusEl = document.getElementById('gpu-status');
            if (navigator.gpu) {
                try {
                    const adapter = await navigator.gpu.requestAdapter();
                    if (adapter) {
                        statusEl.innerText = '✅ WebGPU 已啟用 (硬體加速中)';
                        statusEl.className = 'mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700';
                        return true;
                    }
                } catch (e) {}
            }
            statusEl.innerText = '⚠️ WebGPU 不可用 (將切換至 CPU 模式)';
            statusEl.className = 'mt-4 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700';
            return false;
        }

        // 初始化 AI 模型 (更換為 Donut)
        async function initAI() {
            const hasWebGPU = await checkWebGPU();
            const { pipeline, env } = window.transformers;

            // 關閉遙測與不必要的快取檢查以提升載入速度
            env.allowLocalModels = false;

            try {
                // 使用 Donut 模型進行文件 OCR 任務
                // 'Xenova/donut-base-finetuned-docvqa' 是 Donut 的一個變體，對文件結構有極佳的理解力
                ocrPipeline = await pipeline('document-question-answering', 'Xenova/donut-base-finetuned-docvqa', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            document.getElementById('model-progress').style.width = `${p.progress}%`;
                            document.getElementById('model-percent').innerText = `${Math.round(p.progress)}%`;
                            document.getElementById('model-file-info').innerText = `正在下載: ${p.file}`;
                        }
                    },
                    device: hasWebGPU ? 'webgpu' : 'cpu'
                });

                document.getElementById('model-status').className = 'mb-8 p-4 bg-green-50 rounded-xl border border-green-100';
                document.getElementById('model-percent').innerText = '模型就緒';
                document.getElementById('model-percent').className = 'text-xs text-green-600 font-bold';
                document.getElementById('model-file-info').innerText = 'Donut (OCR) 模型已就緒';
            } catch (err) {
                console.error(err);
                document.getElementById('model-info').innerText = '模型載入失敗，建議檢查網路連接或使用 Chrome 瀏覽器。';
            }
        }

        // 處理檔案
        async function handleFile(file) {
            if (!file) return;
            document.getElementById('processing-view').classList.remove('hidden');
            const previewContainer = document.getElementById('preview-container');
            previewContainer.innerHTML = '';
            processedPages = [];

            if (file.type === 'application/pdf') {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                
                const maxPages = Math.min(pdf.numPages, 5); // 限制頁數以防瀏覽器記憶體溢出
                for (let i = 1; i <= maxPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); // 提高縮放比例以提升 OCR 準確度
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    const imgData = canvas.toDataURL('image/png');
                    addPreview(imgData, `第 ${i} 頁`);
                    processedPages.push({ image: imgData, canvas: canvas });
                }
            } else {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgData = e.target.result;
                    addPreview(imgData, '圖片頁面');
                    processedPages.push({ image: imgData });
                };
                reader.readAsDataURL(file);
            }
            document.getElementById('convert-btn').disabled = false;
        }

        function addPreview(src, label) {
            const div = document.createElement('div');
            div.className = 'relative group';
            div.innerHTML = `
                <img src="${src}" class="w-full h-32 object-cover rounded-lg border border-slate-200 shadow-sm">
                <span class="absolute bottom-1 right-1 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm">${label}</span>
            `;
            document.getElementById('preview-container').appendChild(div);
        }

        // 轉換邏輯 (使用 Donut 推論)
        async function convertToPPTX() {
            const btn = document.getElementById('convert-btn');
            btn.disabled = true;
            btn.innerText = 'AI 結構分析中...';

            const pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_WIDE';

            for (let i = 0; i < processedPages.length; i++) {
                const page = processedPages[i];
                const slide = pptx.addSlide();
                
                try {
                    btn.innerText = `正在辨識第 ${i+1}/${processedPages.length} 頁...`;
                    
                    // 使用 Donut 進行文件問答 (這是一種獲取文件內容的強大方式)
                    // 我們給模型一個提示，讓它提取所有可見文字
                    const prompt = "What is written in this document?";
                    const result = await ocrPipeline(page.image, prompt);
                    
                    // Donut 回傳的通常是結構化文字內容
                    const detectedText = result[0]?.answer || "無法讀取內容";

                    // 1. 添加背景圖作為參考 (DeckEdit 模式：背景圖片 + 浮動文字)
                    slide.addImage({ data: page.image, x: 0, y: 0, w: '100%', h: '100%', opacity: 0.1 });

                    // 2. 模擬標題
                    slide.addText("辨識結果 (標題)", {
                        x: 0.5, y: 0.3, w: '90%', h: 0.8,
                        fontSize: 32, color: '1A365D', bold: true, fontFace: 'Arial'
                    });

                    // 3. 添加 AI 辨識出的主要內容文字塊
                    slide.addText(detectedText.trim(), {
                        x: 0.5, y: 1.5, w: '90%', h: 4,
                        fontSize: 18, color: '2D3748',
                        align: 'left', valign: 'top',
                        bullet: { type: 'number' },
                        lineSpacing: 28
                    });

                    slide.addText("註：此文字方塊已轉為可編輯狀態。", {
                        x: 0.5, y: 6.5, w: '90%', h: 0.4,
                        fontSize: 10, color: 'A0AEC0', italic: true
                    });

                } catch (e) {
                    console.error("AI 處理出錯", e);
                }
            }

            pptx.writeFile({ fileName: `AI-Deck-Result.pptx` });
            btn.innerText = '轉換成功！';
            setTimeout(() => {
                btn.innerText = '轉換為 PPTX';
                btn.disabled = false;
            }, 3000);
        }

        // 事件綁定
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50', 'border-blue-400'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-blue-50', 'border-blue-400');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        document.getElementById('convert-btn').onclick = convertToPPTX;

        // 啟動
        window.onload = initAI;
    </script>
</body>
</html>
